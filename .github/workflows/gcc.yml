name: GCC

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  Test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flags: [DBG=0, DBG=1 PEDANTIC=2]
        libxs: [prebuilt]
        include:
          - flags: DBG=1 PEDANTIC=2
            libxs: header-only
    steps:
    - uses: actions/checkout@v5

    - name: Install OpenBLAS
      run: sudo apt install -y libopenblas-openmp-dev

    - name: Install OpenCL
      run: sudo apt install -y opencl-c-headers ocl-icd-libopencl1 ocl-icd-opencl-dev

    - name: Setup LIBXS
      run: |
        git clone --depth 1 https://github.com/hfp/libxs.git ${{ github.workspace }}/../libxs
        echo "LIBXSROOT=${{ github.workspace }}/../libxs" >> $GITHUB_ENV

    - name: Build LIBXS
      if: matrix.libxs == 'prebuilt'
      run: cd ${LIBXSROOT} && make -j $(nproc) ${{ matrix.flags }}

    - name: Build LIBXSTREAM
      if: matrix.libxs == 'prebuilt'
      run: make -j $(nproc) ${{ matrix.flags }}

    - name: Install (PREFIX)
      if: matrix.libxs == 'prebuilt'
      run: make -j $(nproc) ${{ matrix.flags }} install PREFIX=$HOME/libxstream-install

    - name: Verify install (PREFIX)
      if: matrix.libxs == 'prebuilt'
      run: |
        test -f $HOME/libxstream-install/include/libxstream/libxstream.h
        test -f $HOME/libxstream-install/include/libxstream/libxstream_version.h
        test -f $HOME/libxstream-install/include/libxstream/libxstream_source.h
        test -d $HOME/libxstream-install/include/libxstream/libxstream
        ls $HOME/libxstream-install/lib/libxstream.* >/dev/null

    - name: Out-of-tree build
      if: matrix.libxs == 'prebuilt'
      run: |
        mkdir $HOME/libxstream-oot && cd $HOME/libxstream-oot
        make -j $(nproc) -f ${{ github.workspace }}/Makefile ${{ matrix.flags }}

    - name: Build Samples
      run: make -j $(nproc) ${{ matrix.flags }} PARAMS= samples

  CMake:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gcc: [12, 14]
        shared: [static, shared]
    env:
      CC: gcc-${{ matrix.gcc }}
      CXX: g++-${{ matrix.gcc }}
    steps:
    - uses: actions/checkout@v5

    - name: Install GCC ${{ matrix.gcc }}
      run: sudo apt install -y gcc-${{ matrix.gcc }} g++-${{ matrix.gcc }}

    - name: Install OpenCL
      run: sudo apt install -y opencl-c-headers ocl-icd-libopencl1 ocl-icd-opencl-dev

    - name: Setup LIBXS
      run: |
        git clone --depth 1 https://github.com/hfp/libxs.git ${{ github.workspace }}/../libxs

    - name: Build and install LIBXS (CMake)
      run: |
        cmake -B ${{ github.workspace }}/../libxs/build \
          -S ${{ github.workspace }}/../libxs \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/../libxs \
          -DLIBXS_SHARED=${{ matrix.shared == 'shared' && 'ON' || 'OFF' }}
        cmake --build ${{ github.workspace }}/../libxs/build -j $(nproc)
        cmake --install ${{ github.workspace }}/../libxs/build

    - name: Configure LIBXSTREAM
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_INSTALL_PREFIX=$HOME/libxstream-install \
          -DLIBXSTREAM_SHARED=${{ matrix.shared == 'shared' && 'ON' || 'OFF' }} \
          -DLIBXSROOT=${{ github.workspace }}/../libxs

    - name: Build
      run: cmake --build build -j $(nproc)

    - name: Install
      run: cmake --install build

    - name: Verify install
      run: |
        test -f $HOME/libxstream-install/include/libxstream/libxstream.h
        ls $HOME/libxstream-install/lib/libxstream* >/dev/null
        ls $HOME/libxstream-install/lib/pkgconfig/libxstream.pc >/dev/null

  Dispatch:
    needs: Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - name: Trigger LIBXS tests
      run: |
        gh api repos/hfp/libxs/dispatches \
          -f event_type=libxstream-update \
          -f "client_payload[sha]=${{ github.sha }}"
      env:
        GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
